name: "Sideband Library Publish"
description: "Incrementally sync a folder of per-part .SchLib/.PcbLib to the Sideband catalog (add new, delete removed, skip existing)."
inputs:
  slug:        { description: "Catalog library slug",              required: true }
  org:         { description: "GitHub-style org (identity only)",   required: true }
  repo:        { description: "GitHub-style repo (identity only)",  required: true }
  source-dir:  { description: "Folder of per-part .SchLib/.PcbLib", required: true }
  catalog-url: { description: "Website catalog base URL",           required: true }
  token:       { description: "libraries:write publish token",      required: true }
  max-per-run: { description: "Cap new items per run (0 = no cap)", required: false, default: "0" }
  expected-ids: { description: "Path to a file of every id that should exist (incremental-convert mode); removals diff against this instead of source-dir", required: false, default: "" }
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with: { python-version: "3.12" }
    - run: pip install --quiet "requests>=2.31"
      shell: bash
    - run: python "$GITHUB_ACTION_PATH/publish.py"
      shell: bash
      env:
        SLUG: ${{ inputs.slug }}
        ORG: ${{ inputs.org }}
        REPO: ${{ inputs.repo }}
        SOURCE_DIR: ${{ inputs.source-dir }}
        SIDEBAND_CATALOG_URL: ${{ inputs.catalog-url }}
        SIDEBAND_PUBLISH_TOKEN: ${{ inputs.token }}
        MAX_PER_RUN: ${{ inputs.max-per-run }}
        EXPECTED_IDS_FILE: ${{ inputs.expected-ids }}
